      <nav class="second-nav">
        <ul>
         
        </ul>
        
      </nav>
    </div> <!-- end of middle div -->
    <div class="left-bottom">
        <button href="#left" id="add-task">+</button>
    </div>
     
  </section>
  <section id="middle">
    <div class="middle-top">
      <h1>ToDo List</h1>

      <div class="list">
        <ul>
          
          <li class="all-1 active"><span id="all-tasks-active">10</span>All</li>
          <li class="imp-2" >Important</li>
          <li class="comp-3">Completed</li>
          <li class="pend-4">Pending</li>

        </ul>

      </div>

    </div>
    <div class="middle-bottom">
      <div class="tasks">
        <ul>
          <!-- tasks will be added here dynamically -->
           
           
           
        </ul>
      </div>
    </div>

    <div class="add-task">
      <form action="" id="add-task-form">
        <input type="text" placeholder="add a title" required id="title">
        <textarea name="" id="description" cols="30" rows="10" placeholder="add a description" required></textarea>
        <select name="category" id="category" required>
          <option value="" disabled selected hidden>Category</option>
          <option value="Gym">Gym</option>
          <option value="Work">Work</option>
          <option value="Study">Study</option>
          <option value="custom">Custom</option>
        </select>
        <!-- <input type="text" placeholder="Enter Category" style="display: none;"  id="" required > -->
        <input type="date" id="date" placeholder="Select a date" required>
        <label for="st-time">Start Time</label>
        <input type="time" id="st-time" required>
        <label for="st-time">End Time</label>
        <input type="time" id="end-time" required>
        <select name="importante" id="importante" required>
          <option value="" disabled selected hidden>Important</option>
          <option value="yes">Yes</option>
          <option value="No">No</option>
        </select>
          <button type="submit" id="form-submit">Add Task</button>
      </form>

    </div>
  </section> 
</body> 

</html>
